name: console-tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  console-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install package
        run: python -m pip install -e .

      - name: Run console unit workflow
        run: scripts/test-console.sh unit
